<div class="card">
    <h5>Datos Registrales</h5>
    <p>Asegurese de introducir correctamente todos los datos relacionados con el matrimonio </p>
    <div class="grid p-fluid mt-3">
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
                <input type="text" id="inputtext" pInputText [(ngModel)]="value1">
                <label for="inputtext">Nombre(s)</label>
            </span>
        </div>
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
                <input type="text" id="inputtext" pInputText [(ngModel)]="value2">
                <label for="inputtext">Primer Apellido</label>
            </span>
        </div>
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
                <input type="text" id="inputtext" pInputText [(ngModel)]="value3">
                <label for="inputtext">Segundo Apellido</label>
            </span>
        </div>
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
                <input type="text" id="inputtext" pInputText [(ngModel)]="value4">
                <label for="inputtext">Nombre(s)</label>
            </span>
        </div>
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
                <input type="text" id="inputtext" pInputText [(ngModel)]="value5">
                <label for="inputtext">Primer Apellido</label>
            </span>
        </div>
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
                <input type="text" id="inputtext" pInputText [(ngModel)]="value6">
                <label for="inputtext">Segundo Apellido</label>
            </span> 
        </div>
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
                <p-inputNumber inputId="inputnumber" [(ngModel)]="value7"></p-inputNumber>
                <label for="inputnumber">Tomo</label>
            </span>
        </div>
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
                <p-inputNumber inputId="inputnumber" [(ngModel)]="value8"></p-inputNumber>
                <label for="inputnumber">Folio</label>
            </span>
        </div>
        <div class="field col-12 md:col-4">
            <div class="p-inputgroup">
                <span class="p-float-label">                   
			        <p-calendar inputId="calendar" [showIcon]="false" ></p-calendar>                   
                    <label for="calendar">Fecha</label>
                </span>
            </div>
        </div>
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
                <p-autoComplete inputId="autocomplete" [(ngModel)]="value11" [suggestions]="filteredProvincias"
                (completeMethod)="searchProvincias($event)" field="name"></p-autoComplete>
                <label for="autocomplete">Municipio</label>
            </span>
        </div>
        <div class="field col-12 md:col-4">
           
                <span class="p-float-label">
                    <p-autoComplete inputId="autocomplete" [(ngModel)]="value12" [suggestions]="filteredProvincias"
                    (completeMethod)="searchProvincias($event)" field="name"></p-autoComplete>
                    <label for="autocomplete">Provincia</label>
                </span>
        </div>
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
                <textarea inputId="textarea" rows="3" cols="30" [(ngModel)]="value9" pInputTextarea></textarea>
                <label for="textarea">Observaciones</label>
            </span>
        </div>
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
            <button pButton pRipple type="button" label="Registar" class="p-button-rounded width margin"></button>
           
			</span>
        </div>   
        <div class="field col-12 md:col-4">
            <span class="p-float-label">
   
            <button pButton pRipple type="button" label="Cancelar" class="p-button-rounded p-button-secondary width"  (click)="cancelar()"></button>   
			</span>
        </div> 
       
    </div>
</div>
